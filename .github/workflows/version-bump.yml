name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump version in manifest.json
        id: bump
        run: |
          cd vpn-extension
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "${{ github.event.inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          # Update manifest.json
          jq --arg v "$NEW_VERSION" '.version = $v' manifest.json > manifest_temp.json
          mv manifest_temp.json manifest.json

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update documentation versions
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          DATE=$(date +%Y-%m-%d)

          # Update README.md
          sed -i "s/\*\*Version:\*\* [0-9]*\.[0-9]*\.[0-9]*/\*\*Version:\*\* $VERSION/" README.md
          sed -i "s/\*\*Last Updated:\*\* [0-9-]*/\*\*Last Updated:\*\* $DATE/" README.md

          # Update README.fa.md
          sed -i "s/\*\*نسخه:\*\* [0-9]*\.[0-9]*\.[0-9]*/\*\*نسخه:\*\* $VERSION/" README.fa.md
          sed -i "s/\*\*آخرین به‌روزرسانی:\*\* [0-9-]*/\*\*آخرین به‌روزرسانی:\*\* $DATE/" README.fa.md

          # Update README.zh.md
          sed -i "s/\*\*版本：\*\* [0-9]*\.[0-9]*\.[0-9]*/\*\*版本：\*\* $VERSION/" README.zh.md
          sed -i "s/\*\*最后更新：\*\* [0-9-]*/\*\*最后更新：\*\* $DATE/" README.zh.md

      - name: Create commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"

      - name: Push changes
        run: git push

      - name: Create tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
