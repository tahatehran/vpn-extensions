<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOVTI VPN - Debug & Test Console</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px;
        direction: ltr;
      }
      h1 {
        color: #60a5fa;
        margin-bottom: 10px;
        font-size: 1.5rem;
      }
      h2 {
        color: #94a3b8;
        margin: 20px 0 10px;
        font-size: 1.1rem;
        border-bottom: 1px solid #334155;
        padding-bottom: 5px;
      }
      .subtitle {
        color: #64748b;
        margin-bottom: 20px;
      }
      .panel {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
      }
      .log-area {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 10px;
        font-family: "Fira Code", "Consolas", monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        margin-top: 10px;
      }
      .log-area .info {
        color: #60a5fa;
      }
      .log-area .success {
        color: #4ade80;
      }
      .log-area .error {
        color: #f87171;
      }
      .log-area .warn {
        color: #fbbf24;
      }
      .log-area .dim {
        color: #64748b;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        margin: 3px;
      }
      button:hover {
        background: #2563eb;
      }
      button:disabled {
        background: #475569;
        cursor: not-allowed;
      }
      button.danger {
        background: #ef4444;
      }
      button.danger:hover {
        background: #dc2626;
      }
      .btn-group {
        margin: 10px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        padding: 6px 10px;
        text-align: left;
        border-bottom: 1px solid #334155;
        font-size: 13px;
      }
      th {
        color: #94a3b8;
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .badge-pass {
        background: #166534;
        color: #4ade80;
      }
      .badge-fail {
        background: #7f1d1d;
        color: #f87171;
      }
      .badge-warn {
        background: #713f12;
        color: #fbbf24;
      }
      input[type="text"],
      input[type="number"] {
        background: #0f172a;
        border: 1px solid #334155;
        color: #e2e8f0;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 13px;
        margin: 3px;
      }
      label {
        color: #94a3b8;
        font-size: 13px;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🔧 MOVTI VPN Shield - Debug Console</h1>
    <p class="subtitle">
      Debugging and testing tools for the VPN extension (no Chrome APIs
      required)
    </p>

    <!-- Test Results Panel -->
    <div class="panel">
      <h2>🧪 Quick Tests</h2>
      <div class="btn-group">
        <button onclick="runQuickTests()">Run All Quick Tests</button>
        <button onclick="clearLog()">Clear Log</button>
      </div>
      <div id="test-results" class="log-area"></div>
    </div>

    <!-- codeToFlag Test -->
    <div class="panel">
      <h2>🏳️ codeToFlag() Test</h2>
      <div>
        <label>Country Code:</label>
        <input
          type="text"
          id="flag-input"
          value="US"
          maxlength="2"
          style="width: 50px"
        />
        <button onclick="testCodeToFlag()">Convert</button>
        <span
          id="flag-result"
          style="font-size: 24px; margin-left: 10px"
        ></span>
      </div>
      <div class="log-area" id="flag-log"></div>
    </div>

    <!-- State Simulation -->
    <div class="panel">
      <h2>📦 State Simulation</h2>
      <div class="btn-group">
        <button onclick="simulateState('disconnected')">
          Simulate: Disconnected
        </button>
        <button onclick="simulateState('connecting')">
          Simulate: Connecting
        </button>
        <button onclick="simulateState('connected')">
          Simulate: Connected
        </button>
        <button onclick="simulateState('error')">Simulate: Error</button>
      </div>
      <div class="log-area" id="state-log"></div>
    </div>

    <!-- Ping Test -->
    <div class="panel">
      <h2>🏓 Ping Test</h2>
      <div>
        <label>IP:</label>
        <input type="text" id="ping-ip" value="1.1.1.1" />
        <label>Port:</label>
        <input type="number" id="ping-port" value="80" />
        <label>Timeout (ms):</label>
        <input type="number" id="ping-timeout" value="3000" />
        <button onclick="testPingDebug()">Test Ping</button>
      </div>
      <div class="log-area" id="ping-log"></div>
    </div>

    <!-- IP Detection Test -->
    <div class="panel">
      <h2>🌍 IP Detection Test</h2>
      <div class="btn-group">
        <button onclick="testIPDetection()">Detect My IP</button>
        <button onclick="testGeoIP()">Test GeoIP Lookup</button>
      </div>
      <div class="log-area" id="ip-log"></div>
    </div>

    <!-- Server List Simulation -->
    <div class="panel">
      <h2>📋 Server List Test</h2>
      <div class="btn-group">
        <button onclick="testServerList()">Load Mock Servers</button>
        <button onclick="testServerFilter()">Test Filtering</button>
        <button onclick="testServerSort()">Test Sorting</button>
      </div>
      <div id="server-table"></div>
      <div class="log-area" id="server-log"></div>
    </div>

    <!-- Manifest Check -->
    <div class="panel">
      <h2>📋 Manifest Check (requires fetch from extension)</h2>
      <div class="btn-group">
        <button onclick="checkManifest()">Check Manifest Structure</button>
      </div>
      <div class="log-area" id="manifest-log"></div>
    </div>

    <!-- Console Log Capturer -->
    <div class="panel">
      <h2>📝 Console Log Capturer</h2>
      <div class="btn-group">
        <button onclick="startLogCapture()">Start Capturing</button>
        <button onclick="stopLogCapture()">Stop Capturing</button>
        <button onclick="clearLogCapture()">Clear</button>
      </div>
      <div class="log-area" id="capture-log"></div>
    </div>

    <script>
      // ── Utility Functions ──────────────────────

      function log(areaId, message, type = "") {
        const area = document.getElementById(areaId);
        if (!area) return;
        const span = document.createElement("span");
        span.className = type;
        span.textContent = message + "\n";
        area.appendChild(span);
        area.scrollTop = area.scrollHeight;
      }

      function clearLog() {
        document.getElementById("test-results").innerHTML = "";
      }

      // ── codeToFlag ─────────────────────────────

      function codeToFlag(cc) {
        if (!cc || cc.length !== 2) return "🌐";
        const pts = cc
          .toUpperCase()
          .split("")
          .map((c) => 0x1f1e6 - 65 + c.charCodeAt(0));
        return String.fromCodePoint(...pts);
      }

      function testCodeToFlag() {
        const input = document
          .getElementById("flag-input")
          .value.trim()
          .toUpperCase();
        const result = codeToFlag(input);
        document.getElementById("flag-result").textContent = result;
        log("flag-log", `codeToFlag("${input}") = "${result}"`, "info");
      }

      // ── State Simulation ───────────────────────

      function simulateState(state) {
        const logArea = document.getElementById("state-log");
        logArea.innerHTML = "";

        const states = {
          disconnected: {
            connected: false,
            connecting: false,
            label: "غیرفعال",
            sub: "Click to connect",
          },
          connecting: {
            connected: false,
            connecting: true,
            label: "Connecting...",
            sub: "Please wait",
          },
          connected: {
            connected: true,
            connecting: false,
            label: "متصل",
            sub: "🇺🇸 US - 1.2.3.4 (150ms)",
          },
          error: {
            connected: false,
            connecting: false,
            label: "Error",
            sub: "Connection failed",
          },
        };

        const s = states[state];
        log("state-log", `State: ${state}`, "info");
        log("state-log", `  connected: ${s.connected}`, "dim");
        log("state-log", `  connecting: ${s.connecting}`, "dim");
        log("state-log", `  label: "${s.label}"`, "success");
        log("state-log", `  sub: "${s.sub}"`, "success");
      }

      // ── Ping Test ──────────────────────────────

      async function testPingDebug() {
        const ip = document.getElementById("ping-ip").value;
        const port = document.getElementById("ping-port").value;
        const timeout = parseInt(document.getElementById("ping-timeout").value);
        const logArea = document.getElementById("ping-log");
        logArea.innerHTML = "";

        log(
          "ping-log",
          `Testing ${ip}:${port} (timeout: ${timeout}ms)...`,
          "info",
        );

        const start = performance.now();
        try {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), timeout);

          await fetch(`http://${ip}:${port}/`, {
            method: "HEAD",
            mode: "no-cors",
            cache: "no-store",
            signal: controller.signal,
          });

          clearTimeout(timer);
          const elapsed = Math.round(performance.now() - start);
          log("ping-log", `Response in ${elapsed}ms`, "success");
        } catch (e) {
          const elapsed = Math.round(performance.now() - start);
          if (elapsed > 10 && elapsed < timeout) {
            log(
              "ping-log",
              `Server reachable: ${elapsed}ms (timeout/no-cors)`,
              "warn",
            );
          } else {
            log(
              "ping-log",
              `Failed: ${e.message} (${Math.round(elapsed)}ms)`,
              "error",
            );
          }
        }
      }

      // ── IP Detection ───────────────────────────

      async function testIPDetection() {
        const logArea = document.getElementById("ip-log");
        logArea.innerHTML = "";

        log("ip-log", "Detecting IP via api.myip.com...", "info");
        try {
          const resp = await fetch("https://api.myip.com", {
            cache: "no-store",
          });
          const data = await resp.json();
          log("ip-log", `IP: ${data.ip}`, "success");
          log(
            "ip-log",
            `Country: ${data.country} (${data.country_code})`,
            "success",
          );
          log("ip-log", `City: ${data.city || "N/A"}`, "dim");
        } catch (e) {
          log("ip-log", `Error: ${e.message}`, "error");
        }
      }

      async function testGeoIP() {
        const ip = document.getElementById("ping-ip").value || "8.8.8.8";
        const logArea = document.getElementById("ip-log");

        log("ip-log", `Looking up geo for ${ip} via ip-api.com...`, "info");
        try {
          const resp = await fetch(
            `http://ip-api.com/json/${ip}?fields=status,country,countryCode,city`,
          );
          const data = await resp.json();
          if (data.status === "success") {
            log(
              "ip-log",
              `${codeToFlag(data.countryCode)} ${data.country} (${data.countryCode}) - ${data.city || "N/A"}`,
              "success",
            );
          } else {
            log(
              "ip-log",
              `Lookup failed: ${data.message || "unknown"}`,
              "error",
            );
          }
        } catch (e) {
          log("ip-log", `Error: ${e.message}`, "error");
        }
      }

      // ── Server List ────────────────────────────

      const MOCK_SERVERS = [
        {
          id: 0,
          ip: "1.2.3.4",
          port: 8080,
          ping: 150,
          working: true,
          country: { flag: "🇺🇸", name: "United States" },
        },
        {
          id: 1,
          ip: "5.6.7.8",
          port: 3128,
          ping: 250,
          working: true,
          country: { flag: "🇩🇪", name: "Germany" },
        },
        {
          id: 2,
          ip: "9.10.11.12",
          port: 8888,
          ping: 80,
          working: true,
          country: { flag: "🇯🇵", name: "Japan" },
        },
        {
          id: 3,
          ip: "13.14.15.16",
          port: 1080,
          ping: 500,
          working: false,
          country: { flag: "🇬🇧", name: "United Kingdom" },
        },
        {
          id: 4,
          ip: "17.18.19.20",
          port: 8080,
          ping: 120,
          working: true,
          country: { flag: "🇫🇷", name: "France" },
        },
      ];

      function testServerList() {
        const table = document.getElementById("server-table");
        const logArea = document.getElementById("server-log");
        logArea.innerHTML = "";

        let html =
          "<table><tr><th>#</th><th>Flag</th><th>IP:Port</th><th>Ping</th><th>Status</th></tr>";
        MOCK_SERVERS.forEach((s) => {
          const pingClass = !s.working
            ? "badge-fail"
            : s.ping < 200
              ? "badge-pass"
              : "badge-warn";
          html += `<tr>
      <td>${s.id}</td>
      <td>${s.country.flag}</td>
      <td>${s.ip}:${s.port}</td>
      <td><span class="badge ${pingClass}">${s.working ? s.ping + "ms" : "DOWN"}</span></td>
      <td>${s.working ? "✅" : "❌"}</td>
    </tr>`;
        });
        html += "</table>";
        table.innerHTML = html;
        log(
          "server-log",
          `Loaded ${MOCK_SERVERS.length} mock servers`,
          "success",
        );
      }

      function testServerFilter() {
        const logArea = document.getElementById("server-log");
        const filter = "Germany";
        const filtered = MOCK_SERVERS.filter((s) =>
          s.country.name.includes(filter),
        );
        log(
          "server-log",
          `Filter: "${filter}" → ${filtered.length} results`,
          "info",
        );
        filtered.forEach((s) => {
          log(
            "server-log",
            `  ${s.country.flag} ${s.country.name} - ${s.ip}:${s.port}`,
            "success",
          );
        });
      }

      function testServerSort() {
        const logArea = document.getElementById("server-log");
        const sorted = [...MOCK_SERVERS].sort((a, b) => {
          if (a.working && !b.working) return -1;
          if (!a.working && b.working) return 1;
          return a.ping - b.ping;
        });
        log("server-log", "Sorted by status + ping:", "info");
        sorted.forEach((s) => {
          log(
            "server-log",
            `  ${s.working ? "✅" : "❌"} ${s.country.flag} ${s.ip}:${s.port} - ${s.ping}ms`,
            "dim",
          );
        });
      }

      // ── Manifest Check ─────────────────────────

      async function checkManifest() {
        const logArea = document.getElementById("manifest-log");
        logArea.innerHTML = "";

        log(
          "manifest-log",
          "Note: This test requires the extension context.",
          "warn",
        );
        log(
          "manifest-log",
          "For CI testing, use: npm run validate-manifest",
          "info",
        );
        log("manifest-log", "", "dim");

        // Try to load manifest.json via fetch (works when served from extension dir)
        try {
          const resp = await fetch("../vpn-extension/manifest.json");
          const manifest = await resp.json();

          log("manifest-log", "✓ manifest.json loaded successfully", "success");
          log("manifest-log", `  name: ${manifest.name}`, "dim");
          log("manifest-log", `  version: ${manifest.version}`, "dim");
          log(
            "manifest-log",
            `  manifest_version: ${manifest.manifest_version}`,
            manifest.manifest_version === 3 ? "success" : "error",
          );
          log(
            "manifest-log",
            `  background.service_worker: ${manifest.background?.service_worker || "MISSING"}`,
            manifest.background?.service_worker ? "success" : "error",
          );
          log(
            "manifest-log",
            `  action: ${manifest.action ? "✓" : "MISSING"}`,
            manifest.action ? "success" : "error",
          );
          log(
            "manifest-log",
            `  icons: ${Object.keys(manifest.icons || {}).join(", ")}`,
            "dim",
          );
          log(
            "manifest-log",
            `  permissions: ${(manifest.permissions || []).join(", ")}`,
            "dim",
          );
        } catch (e) {
          log(
            "manifest-log",
            `Could not load manifest.json: ${e.message}`,
            "error",
          );
          log(
            "manifest-log",
            "Make sure this page is served from the project root.",
            "warn",
          );
        }
      }

      // ── Quick Tests ────────────────────────────

      function runQuickTests() {
        const area = document.getElementById("test-results");
        area.innerHTML = "";
        let passed = 0;
        let failed = 0;

        function test(name, fn) {
          try {
            fn();
            log("test-results", `  ✅ PASS: ${name}`, "success");
            passed++;
          } catch (e) {
            log("test-results", `  ❌ FAIL: ${name} - ${e.message}`, "error");
            failed++;
          }
        }

        function assert(condition, msg) {
          if (!condition) throw new Error(msg || "Assertion failed");
        }

        log("test-results", "Running Quick Tests...", "info");
        log("test-results", "", "dim");

        // codeToFlag tests
        test('codeToFlag("US") returns 🇺🇸', () =>
          assert(codeToFlag("US") === "🇺🇸"));
        test('codeToFlag("DE") returns 🇩🇪', () =>
          assert(codeToFlag("DE") === "🇩🇪"));
        test('codeToFlag("GB") returns 🇬🇧', () =>
          assert(codeToFlag("GB") === "🇬🇧"));
        test('codeToFlag("JP") returns 🇯🇵', () =>
          assert(codeToFlag("JP") === "🇯🇵"));
        test('codeToFlag("") returns 🌐', () =>
          assert(codeToFlag("") === "🌐"));
        test("codeToFlag(null) returns 🌐", () =>
          assert(codeToFlag(null) === "🌐"));
        test('codeToFlag("A") returns 🌐', () =>
          assert(codeToFlag("A") === "🌐"));
        test('codeToFlag("ABC") returns 🌐', () =>
          assert(codeToFlag("ABC") === "🌐"));

        // State tests
        test("Initial state: connected=false", () => assert(false === false));
        test("State object has required keys", () => {
          const required = [
            "connected",
            "connecting",
            "selectedServer",
            "servers",
            "lastUpdate",
          ];
          const state = {};
          required.forEach((k) => (state[k] = null));
          required.forEach((k) => assert(k in state, `Missing key: ${k}`));
        });

        // Server sorting
        test("Sort: working servers come first", () => {
          const servers = [
            { working: false, ping: 100 },
            { working: true, ping: 300 },
            { working: true, ping: 50 },
          ];
          servers.sort((a, b) => {
            if (a.working && !b.working) return -1;
            if (!a.working && b.working) return 1;
            return a.ping - b.ping;
          });
          assert(servers[0].working === true, "First should be working");
          assert(servers[0].ping === 50, "First should have lowest ping");
          assert(servers[2].working === false, "Last should be non-working");
        });

        // needsRefresh
        test("needsRefresh(null) returns true", () => {
          function needsRefresh(lu) {
            if (!lu) return true;
            return (Date.now() - new Date(lu).getTime()) / 3600000 >= 24;
          }
          assert(needsRefresh(null) === true);
        });
        test("needsRefresh(1 hour ago) returns false", () => {
          function needsRefresh(lu) {
            if (!lu) return true;
            return (Date.now() - new Date(lu).getTime()) / 3600000 >= 24;
          }
          assert(
            needsRefresh(new Date(Date.now() - 3600000).toISOString()) ===
              false,
          );
        });
        test("needsRefresh(48 hours ago) returns true", () => {
          function needsRefresh(lu) {
            if (!lu) return true;
            return (Date.now() - new Date(lu).getTime()) / 3600000 >= 24;
          }
          assert(
            needsRefresh(new Date(Date.now() - 172800000).toISOString()) ===
              true,
          );
        });

        // Server deduplication
        test("Deduplicate servers by IP:PORT", () => {
          const proxies = [
            { ip: "1.1.1.1", port: 80, time_ms: 100 },
            { ip: "1.1.1.1", port: 80, time_ms: 50 },
            { ip: "2.2.2.2", port: 80, time_ms: 200 },
          ];
          const map = new Map();
          proxies.forEach((p) => {
            const key = p.ip + ":" + p.port;
            if (!map.has(key) || p.time_ms < map.get(key).time_ms)
              map.set(key, p);
          });
          assert(map.size === 2, "Should have 2 unique entries");
          assert(map.get("1.1.1.1:80").time_ms === 50, "Should keep best ping");
        });

        log("test-results", "", "dim");
        log(
          "test-results",
          `Results: ${passed} passed, ${failed} failed`,
          failed > 0 ? "error" : "success",
        );
      }

      // ── Console Log Capturer ───────────────────

      let logCaptureActive = false;
      let originalConsole = {};

      function startLogCapture() {
        if (logCaptureActive) return;
        logCaptureActive = true;

        ["log", "warn", "error", "info"].forEach((method) => {
          originalConsole[method] = console[method];
          console[method] = function (...args) {
            const type =
              method === "error"
                ? "error"
                : method === "warn"
                  ? "warn"
                  : "info";
            log(
              "capture-log",
              `[${method.toUpperCase()}] ${args.join(" ")}`,
              type,
            );
            originalConsole[method].apply(console, args);
          };
        });

        log("capture-log", "Console capture started", "success");
      }

      function stopLogCapture() {
        if (!logCaptureActive) return;
        logCaptureActive = false;

        Object.keys(originalConsole).forEach((method) => {
          console[method] = originalConsole[method];
        });
        originalConsole = {};

        log("capture-log", "Console capture stopped", "warn");
      }

      function clearLogCapture() {
        document.getElementById("capture-log").innerHTML = "";
      }
    </script>
  </body>
</html>
