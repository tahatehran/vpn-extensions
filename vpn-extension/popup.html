<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOVTI VPN Shield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="logo">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
              <defs>
                <linearGradient
                  id="logoGrad"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="100%"
                >
                  <stop offset="0%" style="stop-color: #60a5fa" />
                  <stop offset="100%" style="stop-color: #3b82f6" />
                </linearGradient>
              </defs>
              <path
                d="M16 2L4 8v8c0 7.732 5.12 14.96 12 16.8 6.88-1.84 12-9.068 12-16.8V8L16 2z"
                fill="url(#logoGrad)"
                opacity="0.9"
              />
              <path
                d="M16 4l9.6 4.8v7.2c0 6.504-4.192 12.56-9.6 14.24-5.408-1.68-9.6-7.736-9.6-14.24V8.8L16 4z"
                fill="#1E3A5F"
              />
              <path
                d="M16 8l6 3v4.8c0 4.4-2.8 8.52-6 9.6-3.2-1.08-6-5.2-6-9.6v-4.8l6-3z"
                fill="url(#logoGrad)"
              />
              <circle cx="16" cy="15" r="3" fill="white" opacity="0.9" />
              <path
                d="M16 12v-2M16 20v2M12 15H10M22 15h-2"
                stroke="white"
                stroke-width="1.5"
                stroke-linecap="round"
                opacity="0.6"
              />
            </svg>
          </div>
          <div class="brand">
            <h1 class="brand-name">MOVTI VPN</h1>
            <span class="brand-badge">SHIELD</span>
          </div>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="btn-settings" title="تنظیمات">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Connection Status -->
      <div class="status-section">
        <div class="status-ring" id="status-ring">
          <div class="status-ring-inner">
            <div class="status-pulse"></div>
            <div class="status-icon" id="status-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path
                  d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                  id="shield-path"
                />
              </svg>
            </div>
          </div>
          <svg class="status-ring-progress" viewBox="0 0 120 120">
            <circle
              class="ring-bg"
              cx="60"
              cy="60"
              r="54"
              fill="none"
              stroke-width="4"
            />
            <circle
              class="ring-progress"
              cx="60"
              cy="60"
              r="54"
              fill="none"
              stroke-width="4"
              id="ring-progress"
            />
          </svg>
        </div>
        <div class="status-text">
          <span class="status-label" id="status-label">غیرفعال</span>
          <span class="status-sub" id="status-sub">برای اتصال کلیک کنید</span>
        </div>
      </div>

      <!-- Connect Button -->
      <div class="connect-section">
        <button class="connect-btn connect-btn-auto" id="btn-auto-connect">
          <span class="connect-btn-text">اتصال خودکار</span>
        </button>
        <button class="connect-btn" id="connect-btn">
          <span class="connect-btn-text" id="connect-text">اتصال</span>
          <div class="connect-btn-loading" id="connect-loading">
            <div class="spinner"></div>
          </div>
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-ping">--</span>
            <span class="stat-label">پینگ</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-speed">--</span>
            <span class="stat-label">سرعت</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-upload">--</span>
            <span class="stat-label">آپلود</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="stat-download">--</span>
            <span class="stat-label">دانلود</span>
          </div>
        </div>
      </div>

      <!-- Server Selection -->
      <div class="server-section">
        <div class="server-header">
          <h3>انتخاب سرور</h3>
          <button class="btn-text" id="btn-refresh">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="14"
              height="14"
            >
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
            </svg>
            بروزرسانی
          </button>
        </div>

        <!-- Search -->
        <div class="search-box">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="16"
            height="16"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="جستجوی سرور..." />
        </div>

        <!-- Server List -->
        <div class="server-list" id="server-list">
          <div class="server-loading">
            <div class="spinner-sm"></div>
            <span>در حال بارگذاری سرورها...</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <span>MOVTI VPN Shield v1.0</span>
        <span class="footer-dot">•</span>
        <span id="server-count">0 سرور</span>
        <span class="footer-dot">•</span>
        <span id="last-update" class="last-update">بروزرسانی: --</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
